<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mezma Hostel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LANGUAGE -->
<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fa')">FA</button>
  <button onclick="setLang('hy')">HY</button>
</div>

<!-- HERO -->
<header class="hero">

  <h1 class="lang"
      data-en="Mezma Hostel"
      data-fa="هاستل مزما"
      data-hy="Մեզմա Հոսթել">
    Mezma Hostel
  </h1>

  <p class="lang"
     data-en="Comfortable & Affordable Stay in Yerevan"
     data-fa="اقامت راحت و ارزان در ایروان"
     data-hy="Հարմարավետ և մատչելի կացություն Երևանում">
    Comfortable & Affordable Stay in Yerevan
  </p>

  <div class="btn-group">

    <a href="#rooms" class="btn lang"
       data-en="Rooms"
       data-fa="اتاق‌ها"
       data-hy="Սենյակներ">Rooms</a>

    <a href="#booking" class="btn lang"
       data-en="Booking"
       data-fa="رزرو"
       data-hy="Ամրագրում">Booking</a>

    <a href="https://wa.me/37495169597?text=Hello%20I%20want%20to%20book%20a%20room"
       target="_blank"
       class="btn">
       WhatsApp
    </a>

    <a href="https://maps.app.goo.gl/WMrTFTWnRxss3Mr47?g_st=aw"
       target="_blank"
       class="btn">
       Location
    </a>

  </div>

</header>

<!-- ABOUT -->
<section class="section">
  <h2 class="lang" data-en="About Us" data-fa="درباره ما" data-hy="Մեր մասին">About</h2>
  <p class="lang"
     data-en="Cozy hostel in Yerevan for travelers."
     data-fa="هاستل دنج در ایروان."
     data-hy="Հարմարավետ հոսթել Երևանում">
     Cozy hostel
  </p>
</section>

<!-- ROOMS -->
<section id="rooms" class="section dark">
  <h2 class="lang" data-en="Rooms" data-fa="اتاق‌ها" data-hy="Սենյակներ">Rooms</h2>

  <div class="grid">

    <div class="card">
      <h3 class="lang" data-en="Dorm Room" data-fa="خوابگاهی" data-hy="Համատեղ">Dorm</h3>
    </div>

    <div class="card">
      <h3 class="lang" data-en="Private Room" data-fa="خصوصی" data-hy="Անձնական">Private</h3>
    </div>

  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <h2 class="lang" data-en="Gallery" data-fa="گالری" data-hy="Պատկերասրահ">Gallery</h2>

  <div class="gallery">
    <img src="room1.jpg">
    <img src="room2.jpg">
    <img src="room3.jpg">
    <img src="room4.jpg">
    <img src="kitchen1.jpg">
    <img src="bathroom.jpg">
  </div>
</section>

<!-- BOOKING -->
<section id="booking" class="section dark">
  <h2 class="lang" data-en="Booking" data-fa="رزرو" data-hy="Ամրագրում">Booking</h2>

  <form class="form">
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <input type="date">
    <input type="date">
    <input type="number" placeholder="Guests">
    <button class="btn">Send</button>
  </form>
</section>

<!-- CONTACT -->
<section class="section">
  <h2 class="lang" data-en="Contact" data-fa="تماس" data-hy="Կապ">Contact</h2>
  <p>📞 +374 95 169 597</p>
  <p>📧 meysamdibaa@gmail.com</p>
</section>

<footer>© 2026 Mezma Hostel</footer>

<!-- JS -->
<script>
function setLang(lang){
  document.querySelectorAll(".lang").forEach(el=>{
    let t = el.getAttribute("data-"+lang);
    if(t) el.textContent = t;
  });
  localStorage.setItem("lang", lang);
}

window.onload = ()=>{
  setLang(localStorage.getItem("lang") || "en");
};
</script>

</body>
</html>
