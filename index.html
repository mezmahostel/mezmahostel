<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mezma Hostel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LANGUAGE -->
<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fa')">FA</button>
  <button onclick="setLang('hy')">HY</button>
</div>

<!-- HERO -->
<header class="hero">

  <h1 class="lang"
      data-en="Mezma Hostel"
      data-fa="هاستل مزما"
      data-hy="Մեզմա Հոսթել">
    Mezma Hostel
  </h1>

  <p class="lang"
     data-en="Comfortable & Affordable Stay in Yerevan"
     data-fa="اقامت راحت و ارزان در ایروان"
     data-hy="Հարմարավետ և մատչելի կացություն Երևանում">
    Comfortable & Affordable Stay in Yerevan
  </p>

  <div class="btn-group">

    <a href="#rooms" class="btn">Rooms</a>
    <a href="#booking" class="btn">Booking</a>

    <a class="btn"
       target="_blank"
       href="https://wa.me/37495169597?text=Hello%20I%20want%20to%20book">
      WhatsApp
    </a>

  </div>

</header>

<!-- ABOUT -->
<section class="section">
  <h2>About</h2>
  <p>Cozy hostel in Yerevan</p>
</section>

<!-- ROOMS -->
<section id="rooms" class="section dark">
  <h2>Rooms</h2>

  <div class="rooms-grid">
    <div class="room-card">Dorm Room</div>
    <div class="room-card">Private Room</div>
  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <h2>Gallery</h2>

  <div class="gallery">
    <img src="room1.jpg">
    <img src="room2.jpg">
    <img src="room3.jpg">
    <img src="room4.jpg">
    <img src="room5.jpg">
    <img src="room6.jpg">
    <img src="kitchen1.jpg">
    <img src="bathroom.jpg">
  </div>
</section>

<!-- BOOKING -->
<section id="booking" class="section dark">
  <h2>Booking</h2>

  <form class="form">
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <input type="date">
    <input type="date">
    <input type="number" placeholder="Guests">
    <button class="btn">Send</button>
  </form>
</section>

<!-- LOCATION (برگشته مثل قبل) -->
<section class="section">
  <h2>Location</h2>
  <p>Mezma Hostel - Yerevan, Armenia</p>

  <a class="btn"
     target="_blank"
     href="https://maps.app.goo.gl/WMrTFTWnRxss3Mr47?g_st=aw">
    Open Location
  </a>
</section>

<!-- CONTACT -->
<section class="section dark">
  <h2>Contact</h2>
  <p>📞 +374 95 169 597</p>
  <p>📧 meysamdibaa@gmail.com</p>
</section>

<footer>© 2026 Mezma Hostel</footer>

<!-- WHATSAPP FLOAT (برگشته کامل) -->
<a href="https://wa.me/37495169597?text=Hello%20I%20want%20to%20book"
   class="whatsapp-float"
   target="_blank">
  💬
</a>

<!-- LIGHTBOX + LANGUAGE -->
<script>
function setLang(lang){
  document.querySelectorAll(".lang").forEach(el=>{
    let t = el.getAttribute("data-"+lang);
    if(t) el.textContent = t;
  });
  localStorage.setItem("lang", lang);
}

window.onload = ()=>{
  setLang(localStorage.getItem("lang") || "en");
};

/* ZOOM IMAGE FIX */
document.querySelectorAll(".gallery img").forEach(img=>{
  img.addEventListener("click", ()=>{
    const box = document.createElement("div");
    box.className = "lightbox";

    const big = document.createElement("img");
    big.src = img.src;

    box.appendChild(big);
    document.body.appendChild(box);

    box.onclick = ()=>box.remove();
  });
});
</script>

</body>
</html>
