<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mezma Hostel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LANGUAGE SWITCH -->
<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fa')">FA</button>
  <button onclick="setLang('hy')">HY</button>
</div>

<!-- HERO -->
<header class="hero reveal">
  <div class="hero-content">
    <h1 data-en="Mezma Hostel" data-fa="هاستل مزما" data-hy="Մեզմա Հոսթել"></h1>

    <p data-en="Comfortable & Affordable Stay in Yerevan"
       data-fa="اقامت راحت و ارزان در ایروان"
       data-hy="Հարմարավետ և մատչելի կացություն Երևանում"></p>

    <div class="btn-group">
      <a href="#rooms" class="btn" data-en="Rooms" data-fa="اتاق‌ها" data-hy="Սենյակներ"></a>
      <a href="#booking" class="btn" data-en="Booking" data-fa="رزرو" data-hy="Ամրագրում"></a>

      <a target="_blank"
         class="btn"
         href="https://wa.me/37495169597?text=Hello%20I%20want%20to%20book%20a%20room%20at%20Mezma%20Hostel"
         data-en="WhatsApp Booking"
         data-fa="رزرو واتساپ"
         data-hy="WhatsApp ամրագրում">
      </a>
    </div>
  </div>
</header>

<!-- ABOUT -->
<section class="section reveal">
  <h2 data-en="About Us" data-fa="درباره ما" data-hy="Մեր մասին"></h2>
  <p data-en="Cozy hostel in Yerevan with friendly atmosphere for travelers."
     data-fa="هاستلی دنج در ایروان با فضای دوستانه برای مسافران."
     data-hy="Հարմարավետ հոսթել Երևանում ճանապարհորդների համար."></p>
</section>

<!-- ROOMS -->
<section id="rooms" class="section dark reveal">
  <h2 data-en="Rooms" data-fa="اتاق‌ها" data-hy="Սենյակներ"></h2>

  <div class="rooms-grid">
    <div class="room-card">
      <h3 data-en="Dorm Room" data-fa="اتاق خوابگاهی" data-hy="Համատեղ սենյակ"></h3>
      <a href="#gallery" class="btn" data-en="View Rooms" data-fa="مشاهده" data-hy="Դիտել"></a>
    </div>

    <div class="room-card">
      <h3 data-en="Private Room" data-fa="اتاق خصوصی" data-hy="Անձնական սենյակ"></h3>
      <a href="#booking" class="btn" data-en="Book" data-fa="رزرو" data-hy="Ամրագրել"></a>
    </div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery" class="section reveal">
  <h2 data-en="Gallery" data-fa="گالری" data-hy="Պատկերասրահ"></h2>

  <div class="gallery">
    <img src="room1.jpg" class="gallery-img">
    <img src="room2.jpg" class="gallery-img">
    <img src="room3.jpg" class="gallery-img">
    <img src="room4.jpg" class="gallery-img">
    <img src="room5.jpg" class="gallery-img">
    <img src="room6.jpg" class="gallery-img">
    <img src="kitchen1.jpg" class="gallery-img">
    <img src="kitchen2.jpg" class="gallery-img">
    <img src="bathroom.jpg" class="gallery-img">
  </div>
</section>

<!-- FACILITIES -->
<section class="section dark reveal">
  <h2 data-en="Facilities" data-fa="امکانات" data-hy="Հարմարություններ"></h2>

  <ul class="list">
    <li data-en="Free WiFi" data-fa="وای‌فای رایگان" data-hy="Անվճար WiFi"></li>
    <li data-en="Shared Kitchen" data-fa="آشپزخانه مشترک" data-hy="Ընդհանուր խոհանոց"></li>
    <li data-en="Clean Bathrooms" data-fa="حمام تمیز" data-hy="Մաքուր լոգարան"></li>
    <li data-en="24/7 Support" data-fa="پشتیبانی ۲۴ ساعته" data-hy="24/7 աջակցություն"></li>
  </ul>
</section>

<!-- BOOKING -->
<section id="booking" class="section reveal">
  <h2 data-en="Booking" data-fa="رزرو" data-hy="Ամրագրում"></h2>

  <form class="form">
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <input type="date">
    <input type="date">
    <input type="number" placeholder="Guests">
    <button class="btn" type="submit">Send Request</button>
  </form>
</section>

<!-- LOCATION -->
<section class="section dark reveal">
  <h2 data-en="Location" data-fa="موقعیت" data-hy="Գտնվելու վայրը"></h2>

  <p>Mezma Hostel - Yerevan, Armenia</p>

  <a class="btn" target="_blank"
     href="https://maps.app.goo.gl/WMrTFTWnRxss3Mr47?g_st=aw">
    Open in Google Maps
  </a>
</section>

<!-- CONTACT -->
<section class="section reveal">
  <h2 data-en="Contact" data-fa="تماس" data-hy="Կապ"></h2>

  <p>📞 +374 95 169 597</p>
  <p>📧 meysamdibaa@gmail.com</p>
</section>

<footer class="reveal">
  <p>© 2026 Mezma Hostel</p>
</footer>

<!-- SCRIPT -->
<script>
function setLang(lang) {
  document.querySelectorAll("[data-en]").forEach(el => {
    el.textContent = el.getAttribute("data-" + lang);
  });
  localStorage.setItem("lang", lang);
}

window.onload = () => {
  setLang(localStorage.getItem("lang") || "en");
};
</script>

</body>
</html>
